[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOW-FROM https://arpi-org.com"
    Content-Security-Policy = "frame-ancestors 'self' https://arpi-org.com https://www.arpi-org.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
